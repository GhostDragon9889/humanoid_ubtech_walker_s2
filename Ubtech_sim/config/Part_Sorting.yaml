root_path: "../../assets/resources/"

# Minimal calibration stage. The table, part, and robot are added below by
# SceneBuilder, so the textured warehouse is unnecessary for grasp testing.
scene_usd: '../minimal_grasp_scene.usda'

timelimit: 100

task_number: 1

part:
  # 定义 Part A 的资产池
  part_a_assets:
    - "Collected_Task1_PartA_ori_color/Task1_PartA.usd"
    - "Collected_Task1_PartA_red/Task1_PartA.usd"
  # 定义 Part B 的资产池
  part_b_assets:
    - "Collected_Part_B_blue/Part_B.usd"
    - "Collected_Part_B_ori_color/Part_B.usd"
  num_parts: 2  # fallback, used when num_parts_a / num_parts_b not set
  # Calibration mode: use fewer, larger objects so grasp-frame errors are visible
  # without making every attempt fail on tiny contact margins.
  num_parts_a: 1  # Part A quantity (overrides num_parts)
  num_parts_b: 0  # Part B quantity (overrides num_parts)
  use_simple_block: true
  simple_block_size: [0.056, 0.040, 0.088]
  scale: [1.0, 1.0, 1.0]
  rotation_mode: upright
  upright_rotation_deg: [0, 0]
  yaw_range_deg: [-180, 180]
  mass: 0.45
  contact:
    static_friction: 2.0
    dynamic_friction: 1.6
    restitution: 0.0
    contact_offset: 0.002
    rest_offset: 0.0
    max_linear_velocity: 1.0
    max_angular_velocity: 4.0
    damping:
      linear: 0.25
      angular: 0.50
  auto_reset_outside_table: true
  table_edge_tolerance: 0.02
  table_fall_distance: 0.08
  scatter_center_xy: [0.75, 0.20]
  scatter_half_size_xy: [0.035, 0.025]
  scatter_min_distance: 0.18
  scatter_edge_margin_x: 0.045
  scatter_edge_margin_y: 0.045
  spawn_z_offset: 0.055

plane:
  plane_position: 
  - [0.75, 0.28, 1.04]
  plane_scale: 
  - [0.35, 0.3, 0.1] 

table:
  table_usd: 'Collected_table_v2/table_v2.usd'
  table_position: 
  - [0.75, 0.3, 0.5]
  table_scale: 
  - [1.9927, 1.8738, 1.1109]
  contact:
    static_friction: 1.8
    dynamic_friction: 1.4
    restitution: 0.0

robot:
  # Official merged body + UBT hand v3 (relative to repo root zollent_technology/)
  robot_urdf: WalkerS2-Model/walker_s2_official/walker_s2.urdf
  # Fallback USD spawn (used only when robot_urdf is absent):
  robot_usd: 'Collected_WalkerS2_hand3/SubUSDs/s2_hand4_v1.usd'
  robot_position: [0.7, -0.2, 0.9] 
  robot_rotation: [0, 0, 90]
  arm_control:
    mode: kinematic
    stiffness: 180.0
    damping: 25.0
    shoulder_effort_limit: 80.0
    elbow_effort_limit: 65.0
    wrist_effort_limit: 25.0
    velocity_limit: 1.2
    acceleration_limit: 3.0

grasp:
  target_index: 0
  hand_pose: power
  # Each grasp type has its own pre-shape and contact center. These are initial
  # geometry-based values and can be calibrated independently from test images.
  profiles:
    pinch:
      preshape_pose: pinch_pre
      palm_tcp_offset: [0.055, 0.0, 0.04]
      palm_tcp_lateral_offset: 0.028
    tripod:
      preshape_pose: tripod_pre
      palm_tcp_offset: [0.060, 0.0, 0.040]
      palm_tcp_lateral_offset: 0.020
    power:
      preshape_pose: power_pre
      palm_tcp_offset: [0.065, 0.0, 0.035]
      palm_tcp_lateral_offset: 0.0
  pregrasp_distance: 0.08
  grasp_orientation: side
  side_approach_mode: arm_lateral
  side_forward_bias: 0.0
  side_finger_direction: forward
  approach_direction: palm_normal
  grasp_frame: palm
  # Thumb-index pinch center in palm_link coordinates: forward, lateral,
  # palm-normal (m). The lateral offset is mirrored for left/right hands.
  # For a side grasp, palm +X points forward along the tabletop and palm +Z
  # points horizontally inward from the active arm side, like the Tienkung apple grasp.
  palm_tcp_offset: [0.055, 0.0, 0.04]
  palm_tcp_lateral_offset: 0.028
  mirror_palm_tcp_lateral: true
  grasp_height_offset: 0.005
  max_grasp_distance: 0.85
  workspace_x: [0.15, 0.85]
  workspace_y: [-0.65, 0.65]
  workspace_z: [-0.05, 0.55]
  lift_height: 0.17
  approach_time: 3.0
  preshape_time: 0.8
  reach_time: 3.0
  close_time: 1.0
  settle_time: 1.0
  lift_time: 2.0
  ik_rot_weight: 0.18
  ik_pos_tol: 0.012
  ik_rot_tol: 0.12
  ik_null_weight: 0.0
  ik_max_iter: 600
  ik_damping: 0.0001
  ik_dq_max: 0.35
  waypoint_tolerance: 0.04
  waypoint_timeout: 2.5
  scatter_area:
    center: [0.75, 0.28, 1.04]   # 散布中心 [x, y, z]
    size:   [0.36, 0.26]         # 散布半宽 x方向, y方向 (m)  →  x:[0.57,0.93] y:[0.15,0.41]
